spring.application.name=demo-rest

# Swagger
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.persistAuthorization=true
springdoc.model-converters.pageable-converter.enabled=false
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# DGS GraphQL
dgs.graphql.path=/graphql
dgs.graphql.schema-locations=classpath:graphql/*.graphql
dgs.graphql.scan-packages=edu.rutmiit.demo.catapicontract.dto,edu.rutmiit.demo.demorest.graphql
dgs.graphql.graphiql.enabled=true
dgs.graphql.graphiql.path=/graphiql
dgs.graphql.graphiql.static-path=/graphiql
dgs.graphql.graphiql.cdn=true

logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.netflix.graphql.dgs=DEBUG

server.port=3030